version: "1"
name: Example Content Pipeline
slug: example-content-pipeline
objective: Research a technical topic, produce a design document, write the specification,
  and review the final output
created_at: "2026-03-27T00:00:00Z"

nodes:
  - id: 01-research-team
    team: research-team
    team_path: /path/to/your/research-team
    mode: auto
    prompt: |
      根據提供的研究主題，進行完整的資料蒐集與可行性分析。
      涵蓋：目前技術現況、可用工具與框架、各方案的優缺點比較與建議。
      產出結構化的研究報告。
    timeout: 1800

  - id: 02-design-team
    team: design-team
    team_path: /path/to/your/design-team
    mode: gate
    prompt: |
      根據前一階段的研究報告，進行技術架構設計。
      包含：架構決策、元件互動關係、資料流程圖（使用 mermaid 語法）。
      以滿足需求的最簡方案為原則。
    timeout: 1800

  - id: 03-writing-team
    team: writing-team
    team_path: /path/to/your/writing-team
    mode: auto
    prompt: |
      將前一階段的技術設計轉化為完整的規格文件。
      確保每個章節的細節足以直接進入實作階段。
      補充錯誤處理、邊界情況與部署考量。
    timeout: 1800

  - id: 04-review-team
    team: review-team
    team_path: /path/to/your/review-team
    mode: gate
    prompt: |
      審查前一階段產出的規格文件。
      檢查：完整性、一致性、可實作性、是否過度工程化。
      產出審查報告，將問題分為阻塞性與非阻塞性兩類。
    timeout: 1800
