version: "1"
name: Example Prompt Chain
slug: example-prompt-chain
objective: |
  A prompt-only pipeline (no teams needed) that demonstrates every feature
  O-Team supports: inline prompts, external prompt files, cross-node output
  references via {{node:<id>}}, per-node model and effort selection, shared
  workspace files, identity, rules, and mixed auto/gate modes.

  Use case: take a raw article or research note, extract structured facts,
  analyse them, produce a critique, then synthesise a final report.

created_at: "2026-04-18T00:00:00+08:00"

nodes:
  # -------------------------------------------------------------------------
  # Node 1 — Extract (Haiku, low effort)
  #
  # Simple extraction task. Haiku is ~10x cheaper than Opus and plenty for
  # structured parsing. Low effort = no extended thinking.
  # -------------------------------------------------------------------------
  - id: 01-extract
    mode: auto
    model: claude-haiku-4-5-20251001
    effort: low
    timeout: 600
    prompt: |
      # Extract structured facts

      You will receive a raw article or research note. Extract:

      - Key claims (one per line, numbered)
      - Named entities (people, companies, products)
      - Quantitative data (figures, dates, percentages)
      - Open questions or gaps worth investigating

      Output as structured markdown with the headings above.

  # -------------------------------------------------------------------------
  # Node 2 — Analyse (Sonnet, medium effort)
  #
  # Reasoning task. Sonnet balances cost and capability. Medium effort
  # enables moderate extended thinking.
  # -------------------------------------------------------------------------
  - id: 02-analyse
    mode: auto
    model: claude-sonnet-4-6
    effort: medium
    timeout: 1200
    prompt: |
      # Analyse the extracted facts

      Read the facts from the previous step and:
      1. Identify the 3 most important claims
      2. Assess the strength of evidence for each
      3. Note any contradictions or tensions between claims
      4. Surface assumptions the author is making

      Be specific — cite the exact claim you're analysing.

  # -------------------------------------------------------------------------
  # Node 3 — Critique (Opus, high effort, references Node 1 directly)
  #
  # Demonstrates {{node:<id>}} cross-reference: this node needs BOTH the
  # original facts (node 1) AND the analysis (node 2, which is the default
  # previous-step input). The tag expands at prompt-assembly time into:
  #   <output id="01-extract">...original extract content...</output>
  # -------------------------------------------------------------------------
  - id: 03-critique
    mode: auto
    model: claude-opus-4-7
    effort: high
    timeout: 1800
    identity: |
      You are a senior research critic. You reward precision over breadth,
      push back on unsupported leaps, and always separate "what was shown"
      from "what was claimed."
    prompt: |
      # Critical review

      Cross-check the analysis against the original facts to catch any
      mis-readings, over-reach, or cherry-picking.

      Original extracted facts (for verification):

      {{node:01-extract}}

      For the analysis you have received as input, produce:
      - Valid points (agree with evidence)
      - Weak points (claimed but under-supported)
      - Missing angles (the analyst should have covered but didn't)

  # -------------------------------------------------------------------------
  # Node 4 — Synthesise (Opus, max effort, GATE for human review)
  #
  # Final node — pauses for review before completing. Max effort unlocks
  # the deepest extended thinking. References ALL prior outputs explicitly
  # so the model has the full context in one prompt instead of only the
  # immediately preceding step's output.
  # -------------------------------------------------------------------------
  - id: 04-synthesise
    mode: gate
    model: claude-opus-4-7
    effort: max
    timeout: 2400
    prompt_file: ./prompts/04-synthesise.md   # example of external prompt
    # rules: shared style / writing guidelines copied into the node's
    # .claude/rules/ folder. Paths are resolved relative to this YAML.
    rules:
      - ./rules/writing-style.md

# -----------------------------------------------------------------------------
# Features demonstrated in this example
# -----------------------------------------------------------------------------
#
# - Prompt-only nodes (no team field needed)
# - Inline `prompt:` and external `prompt_file:`
# - Cross-node output reference via {{node:<id>}} — replaces the tag with
#   <output id="<id>">...content of node's output.md...</output> at runtime.
#   If the referenced node has not run yet, the tag becomes
#   <output id="<id>" status="not_yet_available"/>
# - Workspace: every completed node's output.md is auto-copied to
#   workspace/<node_id>.md so a downstream node can also instruct the agent
#   to "read workspace/01-extract.md" if the output is too large to inline.
# - `model:` per node — route cheap tasks to Haiku, reasoning to Sonnet,
#   synthesis to Opus. Each node spawns its own subprocess.
# - `effort:` per node — low / medium / high / xhigh / max. Delivered via
#   the CLAUDE_CODE_EFFORT_LEVEL env var scoped to that subprocess, so
#   different nodes in the same run can use different effort levels and
#   parallel runs do not race.
# - `identity:` — written as CLAUDE.md in the node's office folder.
# - `rules:` — paths to shared markdown files, copied into the node's
#   .claude/rules/ and auto-included in the assembled prompt.
# - `mode: auto | gate` — auto runs hands-free, gate pauses for your
#   review with approve/edit/reject/skip.
# - `timeout:` — seconds before the node's subprocess is terminated
#   (default 1800).
#
# Run this pipeline with:   /ot:run example-prompt-chain
