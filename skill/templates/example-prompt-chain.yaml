version: "1"
name: Example Prompt Chain
slug: example-prompt-chain
objective: |
  A 4-step prompt chain that demonstrates every feature O-Team supports.
  Use case: take a raw article, extract facts, analyse them, critique the
  analysis, then synthesise a decision-ready brief.

created_at: "2026-04-18T00:00:00+08:00"

# =============================================================================
# HOW TO REFERENCE A PRIOR STEP'S OUTPUT
# =============================================================================
#
#   Two equivalent syntaxes — pick whichever is more readable:
#
#     {{step:N}}      — by position, 1-based (e.g. {{step:1}} = first node)
#     {{node:<id>}}   — by explicit id  (e.g. {{node:01-extract}})
#
#   At runtime BOTH are replaced with:
#
#       <output id="<id>">
#       ...the full content of that node's output.md...
#       </output>
#
#   Rules:
#     - Must refer to an EARLIER node. Validator warns on out-of-range or
#       forward references.
#     - Multiple references in the same prompt are fine.
#     - By default every node already receives the IMMEDIATELY preceding
#       node's output as input.md — so you only need a reference tag when
#       you want to pull in steps further back, or multiple steps at once.
#     - If the referenced output is huge, prefer reading it from the
#       workspace: every completed node's output.md is auto-copied to
#       workspace/<id>.md, and your prompt can just say
#       "read workspace/01-extract.md".
#
# =============================================================================

nodes:

  # ---------------------------------------------------------------------------
  # Node 1 — Extract (Haiku, cheap + fast)
  # ---------------------------------------------------------------------------
  - id: 01-extract                           # ← other nodes reference this id
    mode: auto
    model: claude-haiku-4-5-20251001
    effort: low
    timeout: 600
    prompt: |
      # Extract structured facts

      Read the raw article provided as input and extract:
        - Key claims (numbered)
        - Named entities (people, companies, products)
        - Quantitative data (figures, dates, percentages)
        - Open questions

      Output as structured markdown.

  # ---------------------------------------------------------------------------
  # Node 2 — Analyse (Sonnet, balanced)
  #
  # This node does NOT need {{node:...}} because its input is already the
  # output of the previous step (Node 1), delivered automatically.
  # ---------------------------------------------------------------------------
  - id: 02-analyse                           # ← other nodes reference this id
    mode: auto
    model: claude-sonnet-4-6
    effort: medium
    timeout: 1200
    prompt: |
      # Analyse the extracted facts

      From the facts provided as input:
        1. Identify the 3 most important claims
        2. Assess evidence strength for each
        3. Note contradictions
        4. Surface author's assumptions

  # ---------------------------------------------------------------------------
  # Node 3 — Critique (Opus, references Node 1 explicitly)
  #
  # Node 3's default input is Node 2's analysis (previous step). But it ALSO
  # needs the original extracted facts (Node 1) to cross-check. So we pull
  # Node 1 in with {{node:01-extract}}.
  # ---------------------------------------------------------------------------
  - id: 03-critique
    mode: auto
    model: claude-opus-4-7
    effort: high
    timeout: 1800
    identity: |
      You are a senior research critic. You reward precision over breadth
      and separate "what was shown" from "what was claimed."
    prompt: |
      # Critical review

      You have been given the analysis as your primary input. Cross-check it
      against the original facts below to catch over-reach or cherry-picking.

      ── Original facts from Node 1 ──────────────────────────
      {{node:01-extract}}
      ────────────────────────────────────────────────────────

      Produce:
        - Valid points (supported by the facts)
        - Weak points (claimed but under-supported)
        - Missing angles

  # ---------------------------------------------------------------------------
  # Node 4 — Synthesise (Opus + max effort, GATE, references EVERY prior node)
  #
  # The final step needs ALL three earlier outputs in one shot to write a
  # coherent brief — so it references Nodes 1, 2, and 3 explicitly. `gate`
  # mode pauses for your approve / edit / reject review before finishing.
  # ---------------------------------------------------------------------------
  - id: 04-synthesise
    mode: gate
    model: claude-opus-4-7
    effort: max
    timeout: 2400
    rules:
      - ./rules/writing-style.md             # copied into node's .claude/rules/
    prompt: |
      # Final synthesis

      Produce a decision-ready brief, under 500 words. Cite which step each
      claim comes from.

      # Mix of both reference syntaxes — {{step:N}} and {{node:<id>}} are
      # equivalent. Use whichever reads more naturally.

      ── Extracted facts (Step 1) ────────────────────────────
      {{step:1}}

      ── Analysis (Step 2) ───────────────────────────────────
      {{step:2}}

      ── Critique (Node 3) ───────────────────────────────────
      {{node:03-critique}}
      ────────────────────────────────────────────────────────

      Structure:
        1. Bottom line (1 paragraph)
        2. Key findings (3–5 bullets, each citing a step)
        3. Open questions
        4. One concrete next step

      If the critique flagged a claim as weak, either drop it or mark it
      "unverified" — do not repeat weak claims as fact.

# =============================================================================
# Features demonstrated
#   - Prompt-only nodes (no team field needed anywhere)
#   - Per-node model:  Haiku → Sonnet → Opus (cost-optimised)
#   - Per-node effort: low → medium → high → max (thinking-optimised)
#   - {{node:<id>}} references: Node 3 pulls in Node 1; Node 4 pulls in 1+2+3
#   - mode auto + gate mixed
#   - identity on Node 3, rules on Node 4, timeout on every node
#
# Run with:  /ot:run example-prompt-chain
# =============================================================================
